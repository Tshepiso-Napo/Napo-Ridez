<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Napo Ridez - Vendor</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initVendorMap" async defer></script>
</head>
<body data-role="Vendor">
  <div class="topbar">
    <img src="logo-placeholder.png" alt="Napo Ridez Logo">
    <h2>Vendor</h2>
    <div class="icons">
      <span>🔔</span>
      <span>👤</span>
    </div>
  </div>

  <div class="orders">
    <h2>New Orders</h2>
    <div class="order-card" data-order-id="1">
      <p>Order #1</p>
      <p>2x Pizza, 1x Coke</p>
      <button>Accept Order</button>
    </div>
    <div class="order-card" data-order-id="2">
      <p>Order #2</p>
      <p>1x Burger, 1x Fries</p>
      <button>Accept Order</button>
    </div>
  </div>

  <div id="map" style="height: 500px;"></div>

  <div class="bottom-nav">
    <a href="#">🏠 Dashboard</a>
    <a href="#">📦 Orders</a>
    <a href="#">💰 Earnings</a>
    <a href="#">👤 Profile</a>
  </div>

  <script src="app.js"></script>
</body>
</html>
