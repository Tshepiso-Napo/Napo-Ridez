<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Napo Ridez - Vendor</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initVendorMap" async defer></script>
</head>
<body data-role="Vendor">
  <div class="topbar">
    <img src="logo-placeholder.png" alt="Napo Ridez Logo">
    <h2>Vendor</h2>
    <div class="icons">
      <span>🔔</span>
      <span>👤</span>
    </div>
  </div>

  <div class="dashboard">
    <div class="stat"><h3>Orders Today</h3><p>12</p></div>
    <div class="stat"><h3>Earnings</h3><p>R850</p></div>
    <div class="stat"><h3>Active Drivers</h3><p>3</p></div>
  </div>

  <div class="orders">
    <h2>🆕 New Orders</h2>
    <div class="order-card"><p>Order #1024</p><p>2x Kota, 1x Coke</p><button>Accept Order</button></div>
    <div class="order-card"><p>Order #1025</p><p>1x Shisanyama Plate</p><button>Accept Order</button></div>
  </div>

  <div class="active-orders">
    <h2>🚚 Active Orders</h2>
    <div class="order-card"><p>Order #1020 - Out for Delivery</p><p>Driver: Thabo</p></div>
    <div id="map"></div>
  </div>

  <div class="bottom-nav">
    <a href="#">🏠 Dashboard</a>
    <a href="#">📦 Orders</a>
    <a href="#">💰 Earnings</a>
    <a href="#">👤 Profile</a>
  </div>

  <script src="app.js"></script>
</body>
</html>
