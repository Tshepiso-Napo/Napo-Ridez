<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Napo Ridez</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="Images/IMG_20250912_035555_769.jpg" alt="Napo Ridez Logo" class="logo-img">
      <p class="tagline">Simple • Fast • Kasi Vibes</p>
    </header>

    <section class="role-section">
      <h2>Get Started As</h2>
      <div class="roles">
        <a href="customer.html" class="role-card">
          <div class="icon"><i class="fa-solid fa-cart-shopping"></i></div>
          <h3>Customer</h3>
          <p>Book rides or order food</p>
        </a>
        <a href="vendor.html" class="role-card">
          <div class="icon"><i class="fa-solid fa-store"></i></div>
          <h3>Vendor</h3>
          <p>Sell your food or products</p>
        </a>
        <a href="driver.html" class="role-card">
          <div class="icon"><i class="fa-solid fa-motorcycle"></i></div>
          <h3>Driver</h3>
          <p>Earn by driving or delivering</p>
        </a>
      </div>
    </section>

    <footer class="auth-section">
      <button class="btn primary">Login</button>
      <button class="btn secondary">Sign Up</button>
    </footer>
  </div>
</body>
</html>
