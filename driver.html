<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Napo Ridez - Driver</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initDriverMap" async defer></script>
</head>
<body data-role="Driver">
  <div class="topbar">
    <img src="logo-placeholder.png" alt="Napo Ridez Logo">
    <h2>Driver</h2>
    <div class="icons">
      <span>🔔</span>
      <span>👤</span>
    </div>
  </div>

  <div class="job-list">
    <h2>Available Rides & Deliveries</h2>
    <div class="job-card">
      <p>Ride #101 - Pickup: ABC, Dropoff: XYZ</p>
      <button>Accept Ride</button>
    </div>
    <div class="job-card">
      <p>Delivery #201 - Vendor: Pizza Place</p>
      <button>Accept Delivery</button>
    </div>
  </div>

  <div id="map" style="height: 500px;"></div>

  <div class="bottom-nav">
    <a href="#">🏠 Dashboard</a>
    <a href="#">🛵 Jobs</a>
    <a href="#">💰 Earnings</a>
    <a href="#">👤 Profile</a>
  </div>

  <script src="app.js"></script>
</body>
</html>
