<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Napo Ridez - Driver</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }
.container { display:flex; flex-direction:column; height:100vh; }

.top-navbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background:#111;
  color:#fff;
}

.logo-img { height:75px; width:auto; }

.top-icons { display:flex; gap:15px; align-items:center; }

.icon-btn {
  background:none;
  border:none;
  color:#fff;
  font-size:18px;
  cursor:pointer;
  position:relative;
}

.badge {
  position:absolute;
  top:-5px;
  right:-8px;
  background:red;
  color:#fff;
  font-size:10px;
  padding:2px 6px;
  border-radius:50%;
}

.btn { padding:8px 12px; border:none; cursor:pointer; border-radius:5px; margin-top:5px; }
.primary { background:#000; color:#fff; }
.secondary { background:red; color:#fff; }
.accept { background:green; color:#fff; }
.reject { background:gray; color:#fff; }

.main-layout { display:flex; flex:1; }

.sidebar {
  width:270px;
  background:#222;
  color:#fff;
  padding:20px;
  overflow-y:auto;
}

.profile-img, .car-img {
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
}

.car-img { border-radius:10px; margin-top:5px; }

.main-content { flex:1; padding:20px; overflow-y:auto; }

.card {
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

#map {
  height:250px;
  background:#ddd;
  border-radius:10px;
  margin-bottom:15px;
}

input {
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:5px;
  border:none;
}

.status-toggle { margin:10px 0; }

.chat-box {
  position:fixed;
  bottom:20px;
  right:20px;
  width:280px;
  background:#fff;
  border-radius:10px;
  display:none;
  flex-direction:column;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.chat-header { background:#000; color:#fff; padding:10px; border-radius:10px 10px 0 0; }

.chat-messages { height:200px; overflow-y:auto; padding:10px; font-size:14px; }

.chat-input { display:flex; }

.chat-input input { flex:1; border:none; padding:10px; }

.chat-input button { background:#000; color:#fff; border:none; padding:10px; }
</style>
</head>

<body>

<script>
if (localStorage.getItem("isLoggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

<div class="container">

<header class="top-navbar">
  <img src="Images/1003620f-9e72-43b5-80e0-0a01fa851da6.png" class="logo-img">

  <div class="top-icons">
    <button class="icon-btn" onclick="toggleNotifications()">
      <i class="fa-solid fa-bell"></i>
      <span class="badge" id="notifCount">0</span>
    </button>

    <button class="icon-btn" onclick="toggleChat()">
      <i class="fa-solid fa-comments"></i>
    </button>

    <button class="btn secondary" onclick="logout()">Logout</button>
  </div>
</header>

<div class="main-layout">

<aside class="sidebar">

  <img id="profileImage" src="Images/user-placeholder.png" class="profile-img">
  <h3 id="driverName">John Doe ⭐ 4.8</h3>
  <p id="carInfo">Toyota Corolla</p>
  <p id="carDetails">White | ABC123</p>
  <img id="carImage" class="car-img">

  <button class="btn primary" onclick="toggleProfileEdit()">Edit Profile</button>

  <div id="profileForm" style="display:none;">
    <input id="nameInput" placeholder="Full Name">
    <input id="carInput" placeholder="Car Model">
    <input id="colorInput" placeholder="Car Color">
    <input id="plateInput" placeholder="Number Plate">
    <input type="file" id="profilePhotoInput">
    <input type="file" id="carPhotoInput">
    <button class="btn accept" onclick="saveProfile()">Save</button>
  </div>

  <div class="status-toggle">
    <label><input type="checkbox" id="driverStatus"> Go Online</label>
  </div>

  <button class="btn primary" onclick="showSection('rides')">Active Ride</button>
  <button class="btn primary" onclick="showSection('requests')">Requests</button>
  <button class="btn primary" onclick="showSection('earnings')">Earnings</button>
  <button class="btn primary" onclick="showSection('history')">Ride History</button>

</aside>

<main class="main-content">

<div id="map"></div>

<div id="rides" class="section">
  <div class="card">
    <h3>Active Ride</h3>
    <p id="rideStatus">No ride in progress</p>
    <button class="btn primary" onclick="startTrip()">Start Trip</button>
    <button class="btn secondary" onclick="endTrip()">End Trip</button>
  </div>
</div>

<div id="requests" class="section" style="display:none;">
  <h3>Ride Requests</h3>
  <div id="rideRequests"></div>

  <h3>Delivery Requests</h3>
  <div id="deliveryRequests"></div>
</div>

<div id="earnings" class="section" style="display:none;">
  <div class="card">
    <h3>Today's Earnings</h3>
    <p id="earnings">R0.00</p>
    <p id="tripCount">Trips: 0</p>
  </div>
</div>

<div id="history" class="section" style="display:none;">
  <div class="card">
    <h3>Ride History</h3>
    <div id="historyList"></div>
  </div>
</div>

</main>
</div>
</div>

<div class="chat-box" id="chatBox">
<div class="chat-header">Chat</div>
<div class="chat-messages" id="chatMessages"></div>
<div class="chat-input">
<input id="chatInput">
<button onclick="sendMessage()">Send</button>
</div>
</div>

<script>
let online=false;
let currentRide=null;
let earnings=0;
let trips=0;
let history=[];

function toggleProfileEdit(){
  let f=document.getElementById("profileForm");
  f.style.display=f.style.display==="none"?"block":"none";
}

function saveProfile(){
  localStorage.setItem("driverName",document.getElementById("nameInput").value);
  localStorage.setItem("carInfo",document.getElementById("carInput").value);
  localStorage.setItem("carColor",document.getElementById("colorInput").value);
  localStorage.setItem("carPlate",document.getElementById("plateInput").value);

  let p=document.getElementById("profilePhotoInput").files[0];
  let c=document.getElementById("carPhotoInput").files[0];

  if(p){
    let r=new FileReader();
    r.onload=e=>localStorage.setItem("profileImage",e.target.result);
    r.readAsDataURL(p);
  }

  if(c){
    let r=new FileReader();
    r.onload=e=>localStorage.setItem("carImage",e.target.result);
    r.readAsDataURL(c);
  }

  loadProfile();
}

function loadProfile(){
  let n=localStorage.getItem("driverName")||"John Doe";
  let c=localStorage.getItem("carInfo")||"Toyota Corolla";
  let col=localStorage.getItem("carColor")||"White";
  let p=localStorage.getItem("carPlate")||"ABC123";

  document.getElementById("driverName").innerText=n+" ⭐ 4.8";
  document.getElementById("carInfo").innerText=c;
  document.getElementById("carDetails").innerText=col+" | "+p;

  if(localStorage.getItem("profileImage"))
    document.getElementById("profileImage").src=localStorage.getItem("profileImage");

  if(localStorage.getItem("carImage"))
    document.getElementById("carImage").src=localStorage.getItem("carImage");
}

document.getElementById("driverStatus").onchange=function(){
  online=this.checked;
  if(online) generateRequests();
};

function generateRequests(){
  document.getElementById("rideRequests").innerHTML=`
  <div class="card">
    <p>Main Street → Mall</p>
    <button class="btn accept" onclick="acceptRide('Ride')">Accept</button>
  </div>`;

  document.getElementById("deliveryRequests").innerHTML=`
  <div class="card">
    <p>KFC → Home</p>
    <button class="btn accept" onclick="acceptRide('Delivery')">Accept</button>
  </div>`;
}

function acceptRide(t){
  currentRide=t;
  document.getElementById("rideStatus").innerText=t+" accepted";
  showSection("rides");
}

function startTrip(){
  if(!currentRide)return;
  document.getElementById("rideStatus").innerText="Trip started";
}

function endTrip(){
  if(!currentRide)return;
  document.getElementById("rideStatus").innerText="Completed";

  earnings+=50;
  trips++;

  history.push("Completed "+currentRide);

  document.getElementById("earnings").innerText="R"+earnings;
  document.getElementById("tripCount").innerText="Trips: "+trips;

  updateHistory();

  currentRide=null;
}

function updateHistory(){
  document.getElementById("historyList").innerHTML=
    history.map(h=>`<div class="card">${h}</div>`).join("");
}

let notif=0;
function toggleNotifications(){
  notif=0;
  document.getElementById("notifCount").innerText=0;
}

function toggleChat(){
  let c=document.getElementById("chatBox");
  c.style.display=c.style.display==="flex"?"none":"flex";
}

function sendMessage(){
  let i=document.getElementById("chatInput");
  if(!i.value)return;

  document.getElementById("chatMessages").innerHTML+=
    `<div>You: ${i.value}</div>`;

  i.value="";
}

function showSection(s){
  document.querySelectorAll(".section").forEach(x=>x.style.display="none");
  document.getElementById(s).style.display="block";
}

function logout(){
  localStorage.setItem("isLoggedIn","false");
  window.location.href="login.html";
}

window.onload=loadProfile;
</script>

</body>
</html>
