<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Napo Ridez - Customer</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="container">

    <header class="top-navbar">
      <img src="Images/1003620f-9e72-43b5-80e0-0a01fa851da6.png" alt="Napo Ridez Logo" class="logo-img">
      <div class="top-icons">
        <button class="btn primary">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-badge">3</span>
        </button>
      </div>
    </header>

    <div class="main-layout">

      <aside class="sidebar">
        <div class="profile-section">
          <img src="Images/user-placeholder.png" alt="User Profile" class="profile-img">
          <h3>Tshepiso Michael</h3>
        </div>
        <nav class="sidebar-nav">
          <button class="btn primary"><i class="fa-solid fa-user"></i> Profile</button>
          <button class="btn primary"><i class="fa-solid fa-clock-rotate-left"></i> History</button>
          <button class="btn primary"><i class="fa-solid fa-cog"></i> Settings</button>
          <button class="btn primary"><i class="fa-solid fa-credit-card"></i> Payments</button>
          <button class="btn primary"><i class="fa-solid fa-headset"></i> Support</button>
          <button class="btn primary"><i class="fa-solid fa-comments"></i> Chat</button>
        </nav>
      </aside>

      <main class="main-content">
        <h2>Customer Dashboard</h2>

        <div class="search-bar">
          <input type="text" placeholder="Search restaurants, shops, or rides...">
          <button class="btn primary"><i class="fa-solid fa-search"></i></button>
        </div>

        <div class="role-cards">
          <button class="role-card">
            <div class="icon"><i class="fa-solid fa-car-side"></i></div>
            <h3>Book a Ride</h3>
            <p>Get to your destination quickly</p>
          </button>
          <button class="role-card">
            <div class="icon"><i class="fa-solid fa-burger"></i></div>
            <h3>Order Food</h3>
            <p>Get meals delivered from local vendors</p>
          </button>
          <button class="role-card shop">
            <div class="icon"><i class="fa-solid fa-bag-shopping"></i></div>
            <h3>Shop Nearby</h3>
            <p>Clothes, electronics, and more</p>
          </button>
        </div>

        <section class="map-section">
          <h3>Your Map</h3>
          <div id="customer-map" style="width:100%; height:300px; background:#ddd; border-radius:1rem;"></div>
        </section>

        <section class="promos">
          <h3>Special Offers</h3>
          <p>No active promotions at the moment.</p>
        </section>
      </main>

    </div>

  </div>

  <div class="chat-window" style="display:none;">
    <div class="chat-header">
      <h4>Chat with your driver/vendor</h4>
      <button class="btn secondary">Close</button>
    </div>
    <div class="chat-messages">
      <p><strong>Driver:</strong> On my way!</p>
      <p><strong>You:</strong> Great, thanks!</p>
    </div>
    <div class="chat-input">
      <input type="text" placeholder="Type a message...">
      <button class="btn primary"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>
</body>
</html>
